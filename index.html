<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YUKAのサイト</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: sans-serif;
      background: #0a0a0a;
      color: #fff;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .container {
      text-align: center;
    }
    h1 {
      font-size: 3em;
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 1s ease forwards;
    }
    p {
      font-size: 1.2em;
      color: #888;
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 1s ease 0.4s forwards;
    }
    .dot {
      width: 8px;
      height: 8px;
      background: #fff;
      border-radius: 50%;
      display: inline-block;
      margin: 30px 6px 0;
      opacity: 0;
      animation: fadeUp 1s ease 0.8s forwards, bounce 1.5s ease 1.8s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.9s, 1.9s; }
    .dot:nth-child(3) { animation-delay: 1.0s, 2.0s; }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>こんにちは！👋</h1>
    <p>はじめてのウェブサイトです。</p>
    <div>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
  </div>
</body>
</html>
